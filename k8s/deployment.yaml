apiVersion: v1
kind: Namespace
metadata:
  name: history-explorer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: history-explorer
  namespace: history-explorer
  labels:
    app: history-explorer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: history-explorer
  template:
    metadata:
      labels:
        app: history-explorer
    spec:
      initContainers:
        - name: migrate
          image: jaysuzi5/history-explorer:latest
          imagePullPolicy: Always
          command: ["uv", "run", "python", "manage.py", "migrate", "--no-input"]
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: "config.settings"
            - name: POSTGRES_DB
              value: "history-explorer"
            - name: POSTGRES_HOST
              value: "postgresql-rw.postgresql.svc.cluster.local"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: history-explorer
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: history-explorer
                  key: password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: history-explorer
                  key: secret_key
      containers:
        - name: history-explorer
          image: jaysuzi5/history-explorer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /
              port: 8000
              httpHeaders:
                - name: Host
                  value: history-explorer.jaycurtis.org
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: "config.settings"
            - name: DJANGO_ENV
              value: "production"
            - name: ALLOWED_HOSTS
              value: "history-explorer.jaycurtis.org,localhost"
            - name: CSRF_TRUSTED_ORIGINS
              value: "https://history-explorer.jaycurtis.org"

            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: history-explorer
                  key: secret_key

            - name: POSTGRES_DB
              value: "history-explorer"
            - name: POSTGRES_HOST
              value: "postgresql-rw.postgresql.svc.cluster.local"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: history-explorer
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: history-explorer
                  key: password
---
apiVersion: v1
kind: Service
metadata:
  name: history-explorer
  namespace: history-explorer
spec:
  type: ClusterIP
  selector:
    app: history-explorer
  ports:
    - port: 80
      targetPort: 8000
